  <rect x="24" y="24" width="1232" height="592" rx="34" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <rect x="25" y="25" width="1230" height="590" rx="33" stroke="#DC2626" stroke-opacity="0.18"/>
