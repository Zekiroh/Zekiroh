      <circle cx="34" cy="37" r="9" fill="#DC2626"/>
      <text x="58" y="46" fill="#FFFFFF" font-size="22" font-weight="800">React</text>
    </g>
    <g transform="translate(906 232)">
      <rect width="292" height="74" rx="18" fill="url(#panel)" stroke="#DC2626" stroke-opacity="0.42"/>
      <circle cx="34" cy="37" r="9" fill="#DC2626"/>
      <text x="58" y="46" fill="#FFFFFF" font-size="22" font-weight="800">ASP.NET Core</text>
    </g>
    <g transform="translate(794 324)">
      <rect width="286" height="74" rx="18" fill="url(#panel)" stroke="#DC2626" stroke-opacity="0.42"/>
      <circle cx="34" cy="37" r="9" fill="#DC2626"/>
      <text x="58" y="46" fill="#FFFFFF" font-size="22" font-weight="800">TypeScript</text>
    </g>
    <g transform="translate(930 416)">
      <rect width="236" height="74" rx="18" fill="url(#panel)" stroke="#DC2626" stroke-opacity="0.42"/>
      <circle cx="34" cy="37" r="9" fill="#DC2626"/>
      <text x="58" y="46" fill="#FFFFFF" font-size="22" font-weight="800">Docker</text>
    </g>
    <g transform="translate(750 502)">
      <rect width="224" height="74" rx="18" fill="url(#panel)" stroke="#DC2626" stroke-opacity="0.42"/>
      <circle cx="34" cy="37" r="9" fill="#DC2626"/>
      <text x="58" y="46" fill="#FFFFFF" font-size="22" font-weight="800">MySQL</text>
    </g>
